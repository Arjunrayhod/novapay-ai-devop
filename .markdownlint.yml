# MarkdownLint Configuration
# See: https://github.com/DavidAnson/markdownlint

# Default state for all rules
default: true

# Heading style — allow both atx and setext (auto-generated docs mix styles)
MD003: false

# Line length — disabled (auto-generated docs have long URLs/tables)
MD013: false

# Blanks around headings — disabled (auto-generated docs lack blanks)
MD022: false

# Multiple headings with same content — allow
MD024:
  siblings_only: true

# Multiple top-level headings — disabled
MD025: false

# Blanks around lists — disabled (auto-generated docs)
MD032: false

# Blanks around fenced code blocks — disabled (compact READMEs)
MD031: false

# Blanks around tables — disabled (compact READMEs)
MD058: false

# Table column style — disabled (some tables use compact style)
MD060: false

# Spaces inside code spans — disabled (code samples may have intentional leading spaces)
MD038: false

# Trailing punctuation in heading — relaxed
MD026:
  punctuation: '.,;:!。，；：！'

# Inline HTML — allow (mermaid, etc.)
MD033: false

# Bare URL used — allow
MD034: false

# Emphasis used instead of heading — allow
MD036: false

# Fenced code blocks should have a language
MD040: false

# First line in file should be top-level heading
MD041: false

# Code block indentation — relaxed
MD046:
  style: 'fenced'

# File should end with newline — handled by .editorconfig
MD047: false
