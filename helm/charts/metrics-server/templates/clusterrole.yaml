{{- $appName := (index .Values "aegisai-common").nameOverride }}
{{- $svcAcct := (index .Values "aegisai-common").serviceAccount.name }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ $appName }}
  labels:
    helm.sh/chart: {{ printf "%s-%s" .Chart.Name .Chart.Version | replace "+" "_" | trunc 63 | trimSuffix "-" }}
    app.kubernetes.io/name: {{ $appName }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    app.kubernetes.io/component: {{ .Values.component }}
    app.kubernetes.io/part-of: {{ .Values.partOf }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    aegisai.io/environment: {{ .Values.global.environment }}
    aegisai.io/tier: {{ .Values.global.tier }}
    aegisai.io/data-classification: {{ .Values.global.dataClassification }}
    aegisai.io/owner: {{ .Values.global.owner }}
    aegisai.io/cost-center: {{ .Values.global.costCenter }}
  annotations:
    aegisai.io/environment: {{ .Values.global.environment }}
    aegisai.io/owner: {{ .Values.global.owner }}
    aegisai.io/cost-center: {{ .Values.global.costCenter }}
    aegisai.io/data-classification: {{ .Values.global.dataClassification }}
    aegisai.io/compliance-frameworks: pci-dss,soc2,rbi
rules:
  - apiGroups:
      - ""
    resources:
      - nodes
      - nodes/metrics
      - nodes/stats
      - pods
      - namespaces
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - metrics.k8s.io
    resources:
      - pods
      - nodes
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - autoscaling.k8s.io
    resources:
      - verticalpodautoscalers
    verbs:
      - get
      - list
      - watch
  - nonResourceURLs:
      - /metrics
      - /livez
      - /readyz
    verbs:
      - get
