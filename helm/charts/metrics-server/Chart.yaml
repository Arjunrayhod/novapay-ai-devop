apiVersion: v2
name: metrics-server
description: Metrics Server is a scalable, efficient source of container resource metrics
  for Kubernetes built-in autoscaling pipelines. This chart wraps aegisai-common for
  standard AegisAI platform conventions.

type: application

version: 0.1.0
appVersion: 0.7.2

kubeVersion: '>= 1.30.0'

dependencies:
  - name: aegisai-common
    version: 0.1.0
    repository: file://../aegisai-common
    alias: aegisai-common

keywords:
  - aegisai
  - platform
  - metrics-server
  - autoscaling

home: https://github.com/aegisai/platform

sources:
  - https://github.com/kubernetes-sigs/metrics-server
  - https://github.com/aegisai/platform

maintainers:
  - name: Platform Kubernetes Team
    email: platform-kubernetes@aegisai.io

annotations:
  aegisai.io/environment: production
  aegisai.io/cost-center: platform
  aegisai.io/data-classification: internal
  aegisai.io/compliance: pci-dss,soc2,rbi
  aegisai.io/managed-by: helm
  aegisai.io/platform: aegisai
