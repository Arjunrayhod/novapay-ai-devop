{{- if .Values.configmap.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "aegisai-common.configmapName" . }}
  namespace: {{ include "aegisai-common.namespace" . }}
  labels:
    {{- include "aegisai-common.labels" . | nindent 4 }}
    {{- with .Values.configmap.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  annotations:
    {{- include "aegisai-common.annotations" . | nindent 4 }}
    {{- with .Values.configmap.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
data:
  {{- toYaml .Values.configmap.data | nindent 2 }}
{{- end }}
