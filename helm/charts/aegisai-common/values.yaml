# ---------------------------------------------------------------------------
# AegisAI Common Chart — Global Configuration
# ---------------------------------------------------------------------------
# These values are applied across all templates rendered by this chart.
# Platform service charts that depend on aegisai-common as a subchart
# override these values in their own values.yaml.

global:
  environment: dev
  tier: platform
  dataClassification: internal
  owner: platform-engineering
  costCenter: platform

nameOverride: ''
fullnameOverride: ''

component: ''
partOf: aegisai

priorityClassName: ''

# ---------------------------------------------------------------------------
# Image
# ---------------------------------------------------------------------------
image:
  repository: ''
  tag: ''
  pullPolicy: IfNotPresent
  pullSecrets: []

imagePullSecrets: []

# ---------------------------------------------------------------------------
# Service
# ---------------------------------------------------------------------------
service:
  enabled: true
  type: ClusterIP
  clusterIP: ''
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  annotations: {}
  labels: {}
  loadBalancerClass: ''
  loadBalancerSourceRanges: []
  sessionAffinity: None
  sessionAffinityConfig: {}
  externalTrafficPolicy: ''
  internalTrafficPolicy: ''

# ---------------------------------------------------------------------------
# Deployment
# ---------------------------------------------------------------------------
deployment:
  enabled: true
  replicas: 2
  minReadySeconds: 10
  revisionHistoryLimit: 3

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  podAnnotations: {}
  podLabels: {}

  containerPorts:
    - name: http
      containerPort: 8080
      protocol: TCP

  command: []
  args: []
  env: []
  envFrom: []

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

  securityContext:
    runAsNonRoot: true
    runAsUser: 10001
    runAsGroup: 10001
    fsGroup: 10001
    seccompProfile:
      type: RuntimeDefault

  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true

  livenessProbe:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
    successThreshold: 1

  readinessProbe:
    httpGet:
      path: /readyz
      port: http
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 2
    successThreshold: 1

  startupProbe:
    httpGet:
      path: /startupz
      port: http
    initialDelaySeconds: 3
    periodSeconds: 3
    timeoutSeconds: 3
    failureThreshold: 10

  nodeSelector: {}
  tolerations: []

  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            topologyKey: topology.kubernetes.io/zone

  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: DoNotSchedule

  terminationGracePeriodSeconds: 30

  dnsPolicy: ''
  dnsConfig: {}

  initContainers: []
  extraContainers: []
  volumes: []
  volumeMounts: []

  lifecycle:
    preStop:
      exec:
        command:
          - /bin/sh
          - -c
          - sleep 10

# ---------------------------------------------------------------------------
# ConfigMap
# ---------------------------------------------------------------------------
configmap:
  enabled: true
  data: {}
  mount:
    enabled: false
    path: /etc/config
    subPath: false
  annotations: {}
  labels: {}

# ---------------------------------------------------------------------------
# ServiceAccount
# ---------------------------------------------------------------------------
serviceAccount:
  enabled: true
  create: true
  name: ''
  annotations: {}
  labels: {}
  automountServiceAccountToken: true

# ---------------------------------------------------------------------------
# HorizontalPodAutoscaler
# ---------------------------------------------------------------------------
hpa:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  behavior: {}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

# ---------------------------------------------------------------------------
# PodDisruptionBudget
# ---------------------------------------------------------------------------
pdb:
  enabled: true
  minAvailable: 1
  # maxUnavailable: 1

# ---------------------------------------------------------------------------
# Prometheus ServiceMonitor
# ---------------------------------------------------------------------------
serviceMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: 10s
  path: /metrics
  port: http
  labels: {}
  annotations: {}
  metricRelabelings: []
  relabelings: []
  targetLabels: []
  podTargetLabels: []
  sampleLimit: 0
  targetLimit: 0

# ---------------------------------------------------------------------------
# Ingress
# ---------------------------------------------------------------------------
ingress:
  enabled: false
  className: nginx
  annotations: {}
  labels: {}
  hosts: []
  tls: []

# ---------------------------------------------------------------------------
# Additional raw resources (rendered as-is with standard labels added)
# ---------------------------------------------------------------------------
additionalResources: []
