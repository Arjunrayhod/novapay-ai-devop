apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: aegisai-platform-critical
  labels:
    aegisai.io/priority-tier: platform
value: 10000
globalDefault: false
description: >
  For platform infrastructure components — ingress controllers,
  cert-manager, external-dns, cluster-autoscaler. Highest user-defined
  priority. Never preempted by application workloads.
