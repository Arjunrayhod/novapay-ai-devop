apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: aegisai-batch-low
  labels:
    aegisai.io/priority-tier: batch
value: -100
globalDefault: false
description: >
  For non-critical batch jobs, CI runners, data-processing pipelines.
  Preemptible by all other priority classes. Suitable for workloads
  that can tolerate restart or delayed execution.
