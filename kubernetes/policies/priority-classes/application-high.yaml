apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: aegisai-application-high
  labels:
    aegisai.io/priority-tier: application
value: 1000
globalDefault: false
description: "For critical user-facing application workloads — API gateways, payment processors, real-time services. Preempted by platform/security/observability critical. Preempts normal and batch workloads."
