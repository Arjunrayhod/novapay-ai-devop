apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: aegisai-security-critical
  labels:
    aegisai.io/priority-tier: security
value: 9000
globalDefault: false
description: >
  For security components — OPA/Gatekeeper, Falco, auth proxies.
  Preempted only by platform-critical. Ensures security posture
  during resource contention.
