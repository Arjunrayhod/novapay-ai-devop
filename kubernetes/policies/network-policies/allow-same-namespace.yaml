apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: aegisai-allow-same-namespace
  labels:
    aegisai.io/policy-type: allow-same-namespace
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
  egress:
    - to:
        - podSelector: {}
