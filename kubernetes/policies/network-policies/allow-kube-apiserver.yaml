apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: aegisai-allow-kube-apiserver
  labels:
    aegisai.io/policy-type: allow-apiserver
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: default
      ports:
        - protocol: TCP
          port: 443
