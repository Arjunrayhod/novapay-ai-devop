# Allow egress DNS to CoreDNS.
# Applied to every AegisAI namespace alongside default-deny-all.

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: aegisai-allow-dns
  labels:
    aegisai.io/policy-type: allow-dns
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
