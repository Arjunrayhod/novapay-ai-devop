# Allow ingress from monitoring and platform namespaces.
# Applied to platform namespaces to allow scrape targets and health checks.

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: aegisai-allow-platform
  labels:
    aegisai.io/policy-type: allow-platform
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              aegisai.io/tier: system
        - namespaceSelector:
            matchLabels:
              aegisai.io/tier: platform
