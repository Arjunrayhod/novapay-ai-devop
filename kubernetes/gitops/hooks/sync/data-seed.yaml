apiVersion: batch/v1
kind: Job
metadata:
  name: data-seed
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
    argocd.argoproj.io/sync-wave: '5'
  labels:
    aegisai.io/component: sync-hook
    aegisai.io/hook-type: sync
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: data-seed
          image: public.ecr.aws/docker/library/alpine:3.19
          command:
            - sh
            - -c
            - |
              echo "Seeding reference data..."
              sleep 3
              echo "Data seeding completed"
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
      serviceAccountName: data-seed-sa
  backoffLimit: 2
  ttlSecondsAfterFinished: 300
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: data-seed-sa
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
  labels:
    aegisai.io/component: sync-hook
    aegisai.io/hook-type: sync
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: data-seed-role
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
  labels:
    aegisai.io/component: sync-hook
    aegisai.io/hook-type: sync
rules:
  - apiGroups: ['']
    resources: ['configmaps']
    verbs: ['get', 'list', 'create', 'update']
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: data-seed-binding
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
  labels:
    aegisai.io/component: sync-hook
    aegisai.io/hook-type: sync
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: data-seed-role
subjects:
  - kind: ServiceAccount
    name: data-seed-sa
