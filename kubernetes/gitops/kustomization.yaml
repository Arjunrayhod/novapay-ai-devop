apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: aegisai-gitops
  annotations:
    aegisai.io/component: gitops
    aegisai.io/managed-by: argocd

labels:
  - pairs:
      aegisai.io/managed-by: argocd
      aegisai.io/platform: aegisai
      aegisai.io/tier: platform

resources:
  - argocd
  - rollouts
  - appsets
  - notifications
  - hooks
  - runbooks
  - projects
  - base
  - clusters
  - environments
  - docs
