apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
  labels:
    app.kubernetes.io/name: root
    app.kubernetes.io/part-of: argocd
  annotations:
    argocd.argoproj.io/sync-wave: '0'
spec:
  project: platform
  source:
    repoURL: https://github.com/novapay/novapay-ai-devops
    targetRevision: HEAD
    path: kubernetes/gitops/bootstrap
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
