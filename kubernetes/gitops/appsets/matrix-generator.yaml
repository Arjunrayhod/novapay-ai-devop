apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: matrix-cluster-x-services
  namespace: argocd
  labels:
    app.kubernetes.io/name: matrix-cluster-x-services
    aegisai.io/generator: matrix
  annotations:
    argocd.argoproj.io/sync-wave: '4'
spec:
  goTemplate: true
  goTemplateOptions: ['missingkey=error']
  generators:
    - matrix:
        generators:
          - clusters:
              selector:
                matchLabels:
                  aegisai.io/cluster-type: environment
          - git:
              repoURL: https://github.com/novapay/novapay-ai-devops
              revision: HEAD
              directories:
                - path: 'kubernetes/services/*'
  template:
    metadata:
      name: '{{name}}-{{path.basename}}'
      labels:
        app.kubernetes.io/name: '{{name}}-{{path.basename}}'
        aegisai.io/cluster: '{{name}}'
        aegisai.io/service: '{{path.basename}}'
        aegisai.io/generator: matrix
    spec:
      project: 'environment-{{name}}'
      source:
        repoURL: https://github.com/novapay/novapay-ai-devops
        targetRevision: HEAD
        path: '{{path}}'
      destination:
        server: '{{server}}'
        namespace: 'aegisai-{{path.basename}}-{{name}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          allowEmpty: false
        syncOptions:
          - CreateNamespace=true
          - PruneLast=true
          - ApplyOutOfSyncOnly=true
          - RespectIgnoreDifferences=true
          - ServerSideApply=true
        retry:
          limit: 5
          backoff:
            duration: 30s
            factor: 2
            maxDuration: 5m
---
