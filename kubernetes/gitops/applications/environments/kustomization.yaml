apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: argocd-env-applications
  annotations:
    aegisai.io/component: argocd-env-applications

resources:
  - dev.yaml
  - staging.yaml
  - prod.yaml

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/managed-by: argocd
      app.kubernetes.io/part-of: argocd
