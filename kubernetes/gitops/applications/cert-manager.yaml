apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  labels:
    app.kubernetes.io/name: cert-manager
    app.kubernetes.io/part-of: platform
  annotations:
    argocd.argoproj.io/sync-wave: '3'
spec:
  project: platform
  source:
    repoURL: https://github.com/novapay/novapay-ai-devops
    targetRevision: HEAD
    path: kubernetes/platform/cert-manager
  destination:
    server: https://kubernetes.default.svc
    namespace: aegisai-platform-cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
      - RespectIgnoreDifferences=true
      - ServerSideApply=true
      - Replace=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
  ignoreDifferences:
    - group: cert-manager.io
      kind: ClusterIssuer
      jsonPointers:
        - /status
    - group: cert-manager.io
      kind: Issuer
      jsonPointers:
        - /status
