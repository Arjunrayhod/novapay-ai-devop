apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-dns
  namespace: argocd
  labels:
    app.kubernetes.io/name: external-dns
    app.kubernetes.io/part-of: platform
  annotations:
    argocd.argoproj.io/sync-wave: '4'
spec:
  project: platform
  source:
    repoURL: https://github.com/novapay/novapay-ai-devops
    targetRevision: HEAD
    path: kubernetes/platform/external-dns
  destination:
    server: https://kubernetes.default.svc
    namespace: aegisai-platform-external-dns
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
      - RespectIgnoreDifferences=true
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
