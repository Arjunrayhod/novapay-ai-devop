apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: canary-strategy-template
  labels:
    aegisai.io/component: rollouts-strategies
    aegisai.io/strategy: canary
spec:
  replicas: 5
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: canary-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: canary-app
    spec:
      containers:
        - name: app
          image: public.ecr.aws/nginx/nginx:stable-alpine
          ports:
            - containerPort: 80
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          startupProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3
  strategy:
    canary:
      steps:
        - setWeight: 10
        - pause:
            duration: 5m
        - analysis:
            templates:
              - templateName: error-rate
                clusterScope: false
              - templateName: latency
                clusterScope: false
              - templateName: success-rate
                clusterScope: false
            args:
              - name: namespace
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.namespace
              - name: service
                value: canary-app
        - setWeight: 30
        - pause:
            duration: 5m
        - analysis:
            templates:
              - templateName: error-rate
                clusterScope: false
              - templateName: latency
                clusterScope: false
              - templateName: success-rate
                clusterScope: false
            args:
              - name: namespace
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.namespace
              - name: service
                value: canary-app
        - setWeight: 60
        - pause:
            duration: 5m
        - analysis:
            templates:
              - templateName: error-rate
                clusterScope: false
              - templateName: latency
                clusterScope: false
              - templateName: success-rate
                clusterScope: false
            args:
              - name: namespace
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.namespace
              - name: service
                value: canary-app
        - setWeight: 100
      analysis:
        templates:
          - templateName: error-rate
          - templateName: latency
          - templateName: success-rate
        args:
          - name: namespace
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace
          - name: service
            value: canary-app
      antiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          weight: 100
          podAntiAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 100
                podAffinityTerm:
                  labelSelector:
                    matchLabels:
                      app.kubernetes.io/name: canary-app
                  topologyKey: kubernetes.io/hostname
