apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: gitops-documentation
  annotations:
    aegisai.io/component: gitops-docs

resources:
  - disaster-recovery.yaml
  - backup-restore.yaml
  - repository-failover.yaml
  - validation.yaml
  - architecture.yaml

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/managed-by: argocd
      aegisai.io/component: documentation
