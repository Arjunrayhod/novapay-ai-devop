# Namespace-scoped RoleBindings for every AegisAI namespace tier.
# Each namespace receives RoleBindings that map service accounts and
# groups to the appropriate ClusterRole (admin, edit, view).

---
# ── System: Security ──────────────────────────────────────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: aegisai:binding:system-security:admin
  namespace: aegisai-system-security
  labels:
    aegisai.io/rbac-tier: namespace
    aegisai.io/rbac-role: admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: aegisai:namespace:admin
subjects:
  - kind: ServiceAccount
    name: aegisai-platform-admin
    namespace: aegisai-system-security
  - kind: Group
    name: aegisai:namespace-admins
    apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: aegisai:binding:system-security:edit
  namespace: aegisai-system-security
  labels:
    aegisai.io/rbac-tier: namespace
    aegisai.io/rbac-role: edit
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: aegisai:namespace:edit
subjects:
  - kind: ServiceAccount
    name: aegisai-platform-operator
    namespace: aegisai-system-security
  - kind: ServiceAccount
    name: aegisai-cicd
    namespace: aegisai-system-security
  - kind: Group
    name: aegisai:namespace-editors
    apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: aegisai:binding:system-security:view
  namespace: aegisai-system-security
  labels:
    aegisai.io/rbac-tier: namespace
    aegisai.io/rbac-role: view
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: aegisai:namespace:view
subjects:
  - kind: ServiceAccount
    name: aegisai-readonly
    namespace: aegisai-system-security
  - kind: Group
    name: aegisai:namespace-viewers
    apiGroup: rbac.authorization.k8s.io

---
