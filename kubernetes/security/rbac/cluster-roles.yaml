---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: aegisai:platform:admin
  labels:
    aegisai.io/rbac-tier: platform
aggregationRule:
  clusterRoleSelectors:
    - matchLabels:
        aegisai.io/rbac-aggregate: platform-admin
rules: []
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: aegisai:platform:core-admin
  labels:
    aegisai.io/rbac-tier: platform
    aegisai.io/rbac-aggregate: platform-admin
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - nodes/status
      - namespaces
      - persistentvolumes
      - componentstatuses
    verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
  - apiGroups: ["storage.k8s.io"]
    resources:
      - storageclasses
      - csidrivers
      - csinodes
      - volumeattachments
    verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingressclasses
    verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
  - apiGroups: ["scheduling.k8s.io"]
    resources:
      - priorityclasses
    verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
  - apiGroups: ["node.k8s.io"]
    resources:
      - runtimeclasses
    verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
  - nonResourceURLs:
      - /healthz
      - /livez
      - /readyz
      - /version
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: aegisai:security:admin
  labels:
    aegisai.io/rbac-tier: security
    aegisai.io/rbac-aggregate: platform-admin
rules:
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources:
      - clusterroles
      - clusterrolebindings
    verbs:
      - create
      - get
      - list
      - watch
      - update
      - patch
      - delete
      - bind
      - escalate
  - apiGroups: [""]
    resources:
      - serviceaccounts
    verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
  - apiGroups: ["authentication.k8s.io"]
    resources:
      - tokenreviews
      - selfsubjectreviews
    verbs: ["create"]
  - apiGroups: ["authorization.k8s.io"]
    resources:
      - subjectaccessreviews
      - selfsubjectaccessreviews
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: aegisai:observability:admin
  labels:
    aegisai.io/rbac-tier: observability
    aegisai.io/rbac-aggregate: platform-admin
rules:
  - apiGroups: [""]
    resources:
      - events
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: [""]
    resources:
      - pods/log
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources:
      - configmaps
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apiextensions.k8s.io"]
    resources:
      - customresourcedefinitions
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: aegisai:platform:edit
  labels:
    aegisai.io/rbac-tier: platform
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - namespaces
      - persistentvolumes
    verbs: ["get", "list", "watch"]
  - apiGroups: ["storage.k8s.io"]
    resources:
      - storageclasses
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingressclasses
    verbs: ["get", "list", "watch"]
  - apiGroups: ["scheduling.k8s.io"]
    resources:
      - priorityclasses
    verbs: ["get", "list", "watch"]
  - apiGroups: ["coordination.k8s.io"]
    resources:
      - leases
    verbs: ["create", "get", "list", "update"]
  - nonResourceURLs:
      - /healthz
      - /livez
      - /readyz
      - /version
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: aegisai:platform:view
  labels:
    aegisai.io/rbac-tier: platform
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - namespaces
      - persistentvolumes
      - componentstatuses
    verbs: ["get", "list", "watch"]
  - apiGroups: ["storage.k8s.io"]
    resources:
      - storageclasses
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingressclasses
    verbs: ["get", "list", "watch"]
  - apiGroups: ["scheduling.k8s.io"]
    resources:
      - priorityclasses
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources:
      - events
    verbs: ["get", "list", "watch"]
  - nonResourceURLs:
      - /healthz
      - /livez
      - /readyz
      - /version
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: aegisai:namespace:admin
  labels:
    aegisai.io/rbac-tier: namespace
aggregationRule:
  clusterRoleSelectors:
    - matchLabels:
        aegisai.io/rbac-aggregate: namespace-admin
rules: []
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: aegisai:namespace:workload-admin
  labels:
    aegisai.io/rbac-tier: namespace
    aegisai.io/rbac-aggregate: namespace-admin
rules:
  - apiGroups: ["", "apps", "batch", "networking.k8s.io"]
    resources: ["*"]
    verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
  - apiGroups: ["autoscaling"]
    resources: ["*"]
    verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
