    aegisai.io/rbac-aggregate: namespace-admin
rules:
  - apiGroups: [""]
    resources:
      - secrets
      - configmaps
      - serviceaccounts
    verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: aegisai:namespace:rbac-admin
  labels:
    aegisai.io/rbac-tier: namespace
    aegisai.io/rbac-aggregate: namespace-admin
rules:
