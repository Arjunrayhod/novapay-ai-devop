apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: aegisai:platform:admin-bind
  labels:
    aegisai.io/rbac-tier: platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: aegisai:platform:admin
subjects:
  - kind: Group
    name: aegisai:platform-admins
    apiGroup: rbac.authorization.k8s.io
  - kind: ServiceAccount
    name: aegisai-platform-admin
    namespace: aegisai-system-security
---
