apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: aegisai-gp3-retain
  labels:
    aegisai.io/storage-tier: general-purpose-retain
provisioner: ebs.csi.aws.com
parameters:
  type: gp3
  iops: "3000"
  throughput: "125"
  encrypted: "true"
reclaimPolicy: Retain
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
