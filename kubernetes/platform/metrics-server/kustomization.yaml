# metrics-server AegisAI Platform Component
# https://github.com/kubernetes-sigs/metrics-server

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: aegisai-metrics-server

commonLabels:
  aegisai.io/component: metrics-server
  app.kubernetes.io/name: metrics-server
  app.kubernetes.io/part-of: aegisai

# metrics-server is installed via Helm.
# Generate manifests with:
#   helm repo add metrics-server https://kubernetes-sigs.github.io/metrics-server/
#   helm template metrics-server metrics-server/metrics-server \
#     --namespace aegisai-platform-metrics-server \
#     -f values.yaml > generated.yaml

resources:
  # - generated.yaml
  - namespace.yaml
