# external-dns AegisAI Platform Component
# https://github.com/kubernetes-sigs/external-dns

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: aegisai-external-dns

commonLabels:
  aegisai.io/component: external-dns
  app.kubernetes.io/name: external-dns
  app.kubernetes.io/part-of: aegisai

# external-dns is installed via Helm.
# Generate manifests with:
#   helm repo add bitnami https://charts.bitnami.com/bitnami
#   helm template external-dns bitnami/external-dns \
#     --namespace aegisai-platform-external-dns \
#     -f values.yaml > generated.yaml

resources:
  # - generated.yaml
  - namespace.yaml
