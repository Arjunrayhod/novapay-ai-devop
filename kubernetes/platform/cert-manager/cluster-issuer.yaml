# ClusterIssuer for AegisAI platform using Let's Encrypt + Route53 DNS-01.

apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: aegisai-letsencrypt-prod
  labels:
    aegisai.io/component: cert-manager
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: platform-engineering@aegisai.io
    privateKeySecretRef:
      name: aegisai-letsencrypt-prod-key
    solvers:
      - dns01:
          route53:
            region: ap-south-1
            hostedZoneID: ''  # Populated from Terraform
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: aegisai-letsencrypt-staging
  labels:
    aegisai.io/component: cert-manager
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: platform-engineering@aegisai.io
    privateKeySecretRef:
      name: aegisai-letsencrypt-staging-key
    solvers:
      - dns01:
          route53:
            region: ap-south-1
            hostedZoneID: ''  # Populated from Terraform
