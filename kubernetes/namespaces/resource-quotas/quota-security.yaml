apiVersion: v1
kind: ResourceQuota
metadata:
  name: aegisai-quota-security
  annotations:
    aegisai.io/quota-tier: security
spec:
  hard:
    pods: "30"
    requests.cpu: "4"
    requests.memory: 16Gi
    limits.cpu: "8"
    limits.memory: 32Gi
    configmaps: "20"
    secrets: "50"
    services: "10"
