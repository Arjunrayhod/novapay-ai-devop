apiVersion: v1
kind: LimitRange
metadata:
  name: aegisai-limits-observability
  annotations:
    aegisai.io/limit-tier: observability
spec:
  limits:
    - max:
        cpu: '8'
        memory: 16Gi
      min:
        cpu: 10m
        memory: 32Mi
      default:
        cpu: 500m
        memory: 1Gi
      defaultRequest:
        cpu: 200m
        memory: 512Mi
      type: Container
