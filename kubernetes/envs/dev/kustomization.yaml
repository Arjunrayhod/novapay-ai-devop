apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: aegisai-dev
  annotations:
    aegisai.io/environment: dev

labels:
  - includeSelectors: false
    pairs:
      aegisai.io/environment: dev

commonAnnotations:
  aegisai.io/environment-tier: development

resources:
  - ../../base
  - ../../namespaces
  - ../../security
  - ../../policies
  - ../../storage
  - ../../networking
  - ../../observability
  # managed by individual ArgoCD Applications in kubernetes/gitops/applications/
