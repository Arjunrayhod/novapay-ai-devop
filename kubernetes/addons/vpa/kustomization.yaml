# VPA (Vertical Pod Autoscaler) Addon
# https://github.com/kubernetes/autoscaler/tree/master/vertical-pod-autoscaler

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: aegisai-vpa

commonLabels:
  aegisai.io/component: vpa
  app.kubernetes.io/name: vpa
  app.kubernetes.io/part-of: aegisai

# VPA is installed via Helm:
#   helm repo add cowboysysop https://cowboysysop.github.io/charts/
#   helm template vpa cowboysysop/vpa \
#     --namespace aegisai-addon-vpa \
#     -f values.yaml > generated.yaml

resources:
  # - generated.yaml
  - namespace.yaml
