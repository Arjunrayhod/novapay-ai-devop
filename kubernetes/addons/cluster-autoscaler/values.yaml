# Cluster Autoscaler Helm values for AegisAI platform.

autoDiscovery:
  clusterName: aegisai  # Populated from Terraform EKS module

awsRegion: ap-south-1

serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: ""  # Populated by Terraform IRSA

extraArgs:
  balance-similar-node-groups: true
  skip-nodes-with-system-pods: false
  expander: least-waste

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
