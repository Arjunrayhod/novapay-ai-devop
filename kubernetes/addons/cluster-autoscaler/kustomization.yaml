# Cluster Autoscaler Addon
# https://github.com/kubernetes/autoscaler/tree/master/cluster-autoscaler

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: aegisai-cluster-autoscaler

commonLabels:
  aegisai.io/component: cluster-autoscaler
  app.kubernetes.io/name: cluster-autoscaler
  app.kubernetes.io/part-of: aegisai

# Cluster Autoscaler is installed via Helm:
#   helm repo add autoscaler https://kubernetes.github.io/autoscaler
#   helm template cluster-autoscaler autoscaler/cluster-autoscaler \
#     --namespace aegisai-addon-cluster-autoscaler \
#     -f values.yaml > generated.yaml

resources:
  # - generated.yaml
  - namespace.yaml
