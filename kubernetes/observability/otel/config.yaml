apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: aegisai-observability
  labels:
    app.kubernetes.io/name: otel-collector
data:
  otel-collector-config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch:
        timeout: 1s
        send_batch_size: 1024
      memory_limiter:
        check_interval: 1s
        limit_mib: 512
        spike_limit_mib: 128
      attributes:
        actions:
          - key: environment
            value: production
            action: upsert
          - key: cluster
            value: in-cluster
            action: upsert

    exporters:
      prometheus:
        endpoint: 0.0.0.0:8889
        namespace: otel
      otlp:
        endpoint: tempo:4317
        tls:
          insecure: true
      otlphttp:
        endpoint: http://loki:3100/otlp
        tls:
          insecure: true

    extensions:
      health_check:
        endpoint: 0.0.0.0:13133
      pprof:
        endpoint: 0.0.0.0:1777

    service:
      extensions:
        - health_check
        - pprof
      pipelines:
        traces:
          receivers:
            - otlp
          processors:
            - memory_limiter
            - batch
            - attributes
          exporters:
            - otlp
        metrics:
          receivers:
            - otlp
          processors:
            - memory_limiter
            - batch
            - attributes
          exporters:
            - prometheus
        logs:
          receivers:
            - otlp
          processors:
            - memory_limiter
            - batch
            - attributes
          exporters:
            - otlphttp
