apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-admin
  namespace: aegisai-observability
  labels:
    app.kubernetes.io/name: grafana
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: aws-secrets-manager
  target:
    name: grafana-admin
    creationPolicy: Owner
  data:
    - secretKey: admin-password
      remoteRef:
        key: /aegisai/observability/grafana/admin
        property: password
