apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-config
  namespace: aegisai-observability
  labels:
    app.kubernetes.io/name: tempo
data:
  tempo.yaml: |
    server:
      http_listen_port: 3200
      grpc_listen_port: 9095
      log_level: info

    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318

    ingester:
      max_block_duration: 30m
      trace_idle_period: 10s
      lifecycler:
        ring:
          kvstore:
            store: memberlist
          replication_factor: 1

    compactor:
      compaction:
        block_retention: 336h

    storage:
      trace:
        backend: local
        local:
          path: /tmp/tempo/traces
        wal:
          path: /tmp/tempo/wal

    querier:
      max_concurrent_queries: 8
      frontend_worker:
        frontend_address: 127.0.0.1:9095

    query_frontend:
      max_outstanding_per_tenant: 100

    metrics_generator:
      registry:
        external_labels:
          cluster: in-cluster
          namespace: aegisai-observability
      storage:
        path: /tmp/tempo/generator
        remote_write:
          - url: http://prometheus-operated:9090/api/v1/write
            send_exemplars: true

    overrides:
      metrics_generator_processors:
        - service-graphs
        - span-metrics
