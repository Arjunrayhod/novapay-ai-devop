apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: loki
  annotations:
    aegisai.io/component: loki

namespace: aegisai-observability

resources:
  - statefulset.yaml
  - service.yaml
  - config.yaml

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/name: loki
      aegisai.io/tier: observability
