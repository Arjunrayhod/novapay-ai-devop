  labels:
    aegisai.io/component: network-policy
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: tempo
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              aegisai.io/tier: observability
        - podSelector:
