apiVersion: v1
kind: ResourceQuota
metadata:
  name: observability-quota
  namespace: aegisai-observability
  labels:
    aegisai.io/component: resource-quota
spec:
  hard:
    requests.cpu: "16"
    requests.memory: "32Gi"
    limits.cpu: "32"
    limits.memory: "64Gi"
    persistentvolumeclaims: "20"
    requests.storage: "500Gi"
    count/statefulsets.apps: "10"
    count/deployments.apps: "20"
    count/services: "30"
    count/configmaps: "50"
    count/secrets: "50"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: observability-limits
  namespace: aegisai-observability
  labels:
    aegisai.io/component: limit-range
spec:
  limits:
    - default:
        cpu: "1"
        memory: "1Gi"
      defaultRequest:
        cpu: "100m"
        memory: "128Mi"
      max:
        cpu: "8"
        memory: "16Gi"
      min:
        cpu: "10m"
        memory: "16Mi"
      type: Container
