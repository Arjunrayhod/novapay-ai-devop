apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: observability-base
  annotations:
    aegisai.io/component: observability

resources:
  - namespace.yaml
  - priority-classes.yaml
  - resource-quotas.yaml
  - network-policies.yaml

labels:
  - includeSelectors: false
    pairs:
      aegisai.io/managed-by: argocd
      aegisai.io/platform: aegisai
      aegisai.io/tier: observability
