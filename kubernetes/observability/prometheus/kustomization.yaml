apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: prometheus
  annotations:
    aegisai.io/component: prometheus

namespace: aegisai-observability

resources:
  - operator
  - prometheus.yaml
  - servicemonitors.yaml
  - rules.yaml
  - rbac.yaml

labels:
  - includeSelectors: true
    pairs:
      aegisai.io/tier: observability
      aegisai.io/metrics: prometheus
