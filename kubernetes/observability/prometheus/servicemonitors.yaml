apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: kubelet
  namespace: aegisai-observability
  labels:
    aegisai.io/scrape: prometheus
    app.kubernetes.io/name: kubelet
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: kubelet
  endpoints:
    - port: https-metrics
      scheme: https
      interval: 30s
      path: /metrics
      tlsConfig:
        caFile: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        insecureSkipVerify: true
      bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
    - port: https-metrics
      scheme: https
      interval: 30s
      path: /metrics/cadvisor
      tlsConfig:
        caFile: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        insecureSkipVerify: true
      bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
  namespaceSelector:
    matchNames:
      - kube-system
---
