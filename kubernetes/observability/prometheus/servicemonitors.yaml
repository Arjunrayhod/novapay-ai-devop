apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: prometheus-self
  namespace: aegisai-observability
  labels:
    aegisai.io/scrape: prometheus
    app.kubernetes.io/name: prometheus-self
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: prometheus
  endpoints:
    - port: web
      interval: 15s
      path: /metrics
---
