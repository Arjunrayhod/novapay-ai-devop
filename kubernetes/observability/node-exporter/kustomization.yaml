apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: node-exporter
  annotations:
    aegisai.io/component: node-exporter
namespace: aegisai-observability
resources:
  - rbac.yaml
  - daemonset.yaml
  - service.yaml
labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/name: node-exporter
      aegisai.io/tier: observability
