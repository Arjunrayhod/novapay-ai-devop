apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: alertmanager
  annotations:
    aegisai.io/component: alertmanager

namespace: aegisai-observability

resources:
  - alertmanager.yaml
  - config.yaml

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/name: alertmanager
      aegisai.io/tier: observability
