apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: grafana
  annotations:
    aegisai.io/component: grafana

namespace: aegisai-observability

resources:
  - deployment.yaml
  - service.yaml
  - config.yaml
  - ingress.yaml
  - datasources.yaml
  - dashboards-default.yaml
  - dashboards-base.yaml

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/name: grafana
      aegisai.io/tier: observability
