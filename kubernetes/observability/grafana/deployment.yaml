apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: aegisai-observability
  labels:
    app.kubernetes.io/name: grafana
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana
        aegisai.io/metrics: prometheus
    spec:
      priorityClassName: observability-critical
      securityContext:
        fsGroup: 472
        runAsUser: 472
        runAsGroup: 472
        runAsNonRoot: true
      containers:
        - name: grafana
          image: docker.io/grafana/grafana:11.2.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-admin
                  key: admin-password
                  optional: true
            - name: GF_INSTALL_PLUGINS
              value: ''
          envFrom:
            - configMapRef:
                name: grafana-config
          volumeMounts:
            - name: storage
              mountPath: /var/lib/grafana
            - name: dashboards-config
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards-default
              mountPath: /etc/grafana/provisioning/dashboards/default
            - name: dashboards-base
              mountPath: /etc/grafana/provisioning/dashboards/base
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: '1Gi'
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: grafana-storage
        - name: dashboards-config
          configMap:
            name: grafana-dashboards-config
        - name: dashboards-default
          configMap:
            name: grafana-dashboards-default
        - name: dashboards-base
          configMap:
            name: grafana-dashboards-base
        - name: datasources
          configMap:
            name: grafana-datasources
      nodeSelector:
        kubernetes.io/os: linux
      tolerations:
        - effect: NoSchedule
          key: node-role.kubernetes.io/infra
          operator: Exists
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-storage
  namespace: aegisai-observability
  labels:
    app.kubernetes.io/name: grafana
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard
