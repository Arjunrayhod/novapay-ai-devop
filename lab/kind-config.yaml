kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: aegisai-lab

nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 30000
        hostPort: 30000
        protocol: TCP
      - containerPort: 30001
        hostPort: 30001
        protocol: TCP
      - containerPort: 30002
        hostPort: 30002
        protocol: TCP
    labels:
      aegisai.io/node-type: control-plane
      topology.kubernetes.io/region: lab-local
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "aegisai.io/node-type=control-plane"

  - role: worker
    labels:
      aegisai.io/node-type: worker
      topology.kubernetes.io/region: lab-local
    extraPortMappings:
      - containerPort: 80
        hostPort: 8080
        protocol: TCP
      - containerPort: 443
        hostPort: 8443
        protocol: TCP

  - role: worker
    labels:
      aegisai.io/node-type: worker
      topology.kubernetes.io/region: lab-local

networking:
  ipFamily: ipv4
  apiServerAddress: 0.0.0.0
  apiServerPort: 6443
  podSubnet: "10.244.0.0/16"
  serviceSubnet: "10.96.0.0/12"
  disableDefaultCNI: false

containerdConfigPatches:
  - |-
    [plugins."io.containerd.grpc.v1.cri".registry.mirrors."localhost:5000"]
      endpoint = ["http://kind-registry:5000"]
  - |-
    [plugins."io.containerd.grpc.v1.cri".registry.mirrors."registry.aegisai.local:5000"]
      endpoint = ["http://kind-registry:5000"]
