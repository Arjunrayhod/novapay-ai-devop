name: Build

on:
  push:
    branches: [main, dev, staging]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      meta_version: ${{ steps.meta.outputs.version }}
      meta_tags: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Set build metadata
        id: meta
        run: |
          sha_short=$(git rev-parse --short HEAD)
          echo "sha_short=$sha_short" >> $GITHUB_OUTPUT
          echo "timestamp=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT
          if [[ '${{ github.ref_type }}' == 'tag' ]]; then
            version='${{ github.ref_name }}'
            version=${version#v}
          elif [[ '${{ github.ref_name }}' == 'main' ]]; then
            version='latest'
          else
            version='${{ github.ref_name }}'
          fi
          echo "version=$version" >> $GITHUB_OUTPUT
          tags='ghcr.io/aegisai-platform/platform:'$version
          tags=$tags',ghcr.io/aegisai-platform/platform:sha-'$sha_short
          if [[ '${{ github.ref_name }}' == 'main' ]]; then
            tags=$tags',ghcr.io/aegisai-platform/platform:latest'
          fi
          echo "tags=$tags" >> $GITHUB_OUTPUT
          echo "version=$version"
          echo "tags=$tags"

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.created=${{ steps.meta.outputs.timestamp }}
            org.opencontainers.image.title=AegisAI Platform
            org.opencontainers.image.description=AegisAI Enterprise Autonomous DevSecOps Platform
            org.opencontainers.image.licenses=Proprietary
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/image.tar

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@v0
        with:
          image: docker-archive:/tmp/image.tar
          format: cyclonedx-json
          output-file: sbom-cdx.json
          upload-artifact: false

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@v0
        with:
          image: docker-archive:/tmp/image.tar
          format: spdx-json
          output-file: sbom-spdx.json
          upload-artifact: false

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: image
          path: /tmp/image.tar
          retention-days: 30
          overwrite: true

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: |
            sbom-cdx.json
            sbom-spdx.json
          retention-days: 90
          overwrite: true

  summary:
    name: Build Summary
    if: always()
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate build summary
        run: |
          echo '## Build Pipeline Summary' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '| Item | Value |' >> $GITHUB_STEP_SUMMARY
          echo '|------|-------|' >> $GITHUB_STEP_SUMMARY
          echo '| Version | ${{ needs.build.outputs.meta_version }} |' >> $GITHUB_STEP_SUMMARY
          echo '| Image Tags | ${{ needs.build.outputs.meta_tags }} |' >> $GITHUB_STEP_SUMMARY
          echo '| Commit | ${{ github.sha }} |' >> $GITHUB_STEP_SUMMARY
          echo '| Image Artifact | \`image.tar\` (30 day retention) |' >> $GITHUB_STEP_SUMMARY
          echo '| SBOM (CycloneDX) | \`sbom-cdx.json\` (90 day retention) |' >> $GITHUB_STEP_SUMMARY
          echo '| SBOM (SPDX) | \`sbom-spdx.json\` (90 day retention) |' >> $GITHUB_STEP_SUMMARY
