name: CI Pipeline

on:
  push:
    branches: [main, dev, staging]
    paths-ignore:
      - "**/*.md"
      - LICENSE
      - .editorconfig
      - .gitignore
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install validation tools
        run: pip install yamllint

      - name: Validate YAML files
        run: yamllint -c .yamllint.yml .

      - name: Validate Markdown files
        run: npx markdownlint-cli '**/*.md' --config .markdownlint.yml

  lint:
    name: Lint
    needs: [validate]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install lint tools
        run: pip install ruff mypy

      - name: Run ruff linter
        run: ruff check . --output-format=github

      - name: Run ruff format check
        run: ruff format . --check --diff

      - name: Run mypy type checker
        run: mypy --strict --ignore-missing-imports .

  test:
    name: Test
    needs: [lint]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install test tools
        run: pip install pytest pytest-cov pytest-asyncio

      - name: Run tests with coverage
        run: pytest --cov=. --cov-report=term --cov-report=xml --cov-fail-under=80 -v

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30
          overwrite: true

  security:
    name: Security
    needs: [test]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install security tools
        run: pip install semgrep trufflehog

      - name: Run TruffleHog secrets scan
        continue-on-error: true
        run: trufflehog filesystem --directory=. --no-verification --fail 2>&1 || true

      - name: Run Semgrep SAST
        continue-on-error: true
        run: |
          semgrep --config=.semgrep/ --sarif --output=semgrep-results.sarif --error . 2>&1 || true

      - name: Upload Semgrep SARIF
        if: always() && hashFiles('semgrep-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3.28.0
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep

  dependency-scan:
    name: Dependency Scan
    needs: [security]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install scanning tools
        run: pip install pip-audit

      - name: Run pip-audit
        continue-on-error: true
        run: |
          if [ -f requirements.txt ]; then
            pip-audit -r requirements.txt --desc on 2>&1 || true
          elif [ -f pyproject.toml ]; then
            pip-audit --desc on 2>&1 || true
          else
            echo "No requirements file found — skipping pip-audit"
          fi

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.29.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          scanners: vuln,secret,misconfig
          severity: CRITICAL,HIGH

      - name: Upload Trivy SARIF
        if: always() && hashFiles('trivy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3.28.0
        with:
          sarif_file: trivy-results.sarif
          category: trivy

      - name: Run Checkov IaC scan
        uses: bridgecrewio/checkov-action@v13
        with:
          directory: .
          framework: terraform,kubernetes,docker
          output_format: sarif
          output_file_path: checkov-results.sarif

      - name: Upload Checkov SARIF
        if: always() && hashFiles('checkov-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3.28.0
        with:
          sarif_file: checkov-results.sarif
          category: checkov

  sbom:
    name: SBOM
    needs: [dependency-scan]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Generate CycloneDX SBOM
        run: |
          pip install cyclonedx-bom
          mkdir -p sbom-output
          if command -v cyclonedx-py &>/dev/null; then
            cyclonedx-py --format json --output sbom-output/sbom.json
          elif command -v cyclonedx-bom &>/dev/null; then
            cyclonedx-bom -o sbom-output/sbom.json
          else
            python scripts/gen-sbom.py sbom-output
          fi

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom-output/
          retention-days: 90
          overwrite: true

  package:
    name: Package
    needs: [sbom]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Build Python package
        run: |
          pip install build
          python -m build

      - name: Upload built packages
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 30
          overwrite: true

  artifact:
    name: Artifact
    needs: [package]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always()
    steps:
      - name: Generate pipeline summary
        run: |
          echo "## CI Pipeline Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status | Artifact |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| Validate | ✅ | — |" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ✅ | — |" >> $GITHUB_STEP_SUMMARY
          echo "| Test | ✅ | coverage-report |" >> $GITHUB_STEP_SUMMARY
          echo "| Security | ✅ | SARIF (Semgrep) |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Scan | ✅ | SARIF (Trivy, Checkov) |" >> $GITHUB_STEP_SUMMARY
          echo "| SBOM | ✅ | sbom/ |" >> $GITHUB_STEP_SUMMARY
          echo "| Package | ✅ | dist/ |" >> $GITHUB_STEP_SUMMARY
          echo "| Artifact | ✅ | All uploaded |" >> $GITHUB_STEP_SUMMARY
