name: Security Pipeline

on:
  push:
    branches: [main, dev, staging]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  IMAGE_NAME: aegisai-platform/platform

jobs:
  trivy:
    name: Trivy Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        include:
          - target: filesystem
            scan-type: fs
            scan-ref: .
            sarif-name: trivy-fs
          - target: container
            scan-type: image
            scan-ref: aegisai-platform/platform:scan
            sarif-name: trivy-container
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image for container scan
        if: matrix.target == 'container'
        run: docker build -t ${{ matrix.scan-ref }} -f Dockerfile .
      - name: Run Trivy ${{ matrix.target }} scan
        uses: aquasecurity/trivy-action@0.29.0
        with:
          scan-type: ${{ matrix.scan-type }}
          scan-ref: ${{ matrix.scan-ref }}
          format: sarif
          output: ${{ matrix.sarif-name }}.sarif
          exit-code: '1'
          severity: CRITICAL
      - name: Upload Trivy SARIF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.sarif-name }}
          path: ${{ matrix.sarif-name }}.sarif
          retention-days: 30
          overwrite: true
      - name: Upload Trivy SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3.28.0
        with:
          sarif_file: ${{ matrix.sarif-name }}.sarif
          category: ${{ matrix.sarif-name }}

  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Gitleaks
        run: |
          curl -sSfL \
            'https://github.com/gitleaks/gitleaks/releases/download/v8.18.2/gitleaks_8.18.2_linux_x64.tar.gz' \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version
      - name: Run Gitleaks
        continue-on-error: true
        run: |
          gitleaks detect \
            --source . \
            --report-format sarif \
            --report-path gitleaks.sarif \
            --verbose
      - name: Upload Gitleaks SARIF artifact
        if: always() && hashFiles('gitleaks.sarif') != ''
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks
          path: gitleaks.sarif
          retention-days: 30
          overwrite: true
      - name: Upload Gitleaks SARIF to GitHub Security
        if: always() && hashFiles('gitleaks.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3.28.0
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks

  semgrep:
    name: Semgrep
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install Semgrep
        run: pip install semgrep
      - name: Run Semgrep SAST
        continue-on-error: true
        run: |
          semgrep \
            --config=.semgrep/ \
            --sarif \
            --output=semgrep.sarif \
            --error \
            .
      - name: Upload Semgrep SARIF artifact
        if: always() && hashFiles('semgrep.sarif') != ''
        uses: actions/upload-artifact@v4
        with:
          name: semgrep
          path: semgrep.sarif
          retention-days: 30
          overwrite: true
      - name: Upload Semgrep SARIF to GitHub Security
        if: always() && hashFiles('semgrep.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3.28.0
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  checkov:
    name: Checkov
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install Checkov
        run: pip install checkov
      - name: Run Checkov IaC scan
        continue-on-error: true
        run: |
          checkov \
            --directory . \
            --framework terraform,kubernetes,docker \
            --output sarif \
            --output-file-path checkov.sarif \
            --compact \
            --skip-check CKV_SECRET_*
      - name: Upload Checkov SARIF artifact
        if: always() && hashFiles('checkov.sarif') != ''
        uses: actions/upload-artifact@v4
        with:
          name: checkov
          path: checkov.sarif
          retention-days: 30
          overwrite: true
      - name: Upload Checkov SARIF to GitHub Security
        if: always() && hashFiles('checkov.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3.28.0
        with:
          sarif_file: checkov.sarif
          category: checkov

  sbom:
    name: SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        include:
          - format: cyclonedx
            syft-format: cyclonedx-json
            filename: sbom-cyclonedx.json
          - format: spdx
            syft-format: spdx-json
            filename: sbom-spdx.json
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image for SBOM
        run: docker build -t ${{ env.IMAGE_NAME }}:sbom -f Dockerfile .
      - name: Generate ${{ matrix.format }} SBOM
        uses: anchore/sbom-action@v0.24.0
        with:
          image: ${{ env.IMAGE_NAME }}:sbom
          format: ${{ matrix.syft-format }}
          output-file: ${{ matrix.filename }}
          upload-artifact: false
      - name: Upload ${{ matrix.format }} SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.format }}
          path: ${{ matrix.filename }}
          retention-days: 90
          overwrite: true

  cosign-prepare:
    name: Cosign Prepare
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.8.1
        with:
          cosign-release: 'v2.4.1'
      - name: Verify Cosign installation
        run: cosign version
      - name: Set up keyless signing environment
        run: |
          echo 'COSIGN_EXPERIMENTAL=1' >> "$GITHUB_ENV"
          echo 'Keyless signing environment ready'

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: critical
          comment-summary-in-pr: true
          deny-licenses: GPL-1.0-only, GPL-2.0-only, AGPL-1.0-only, AGPL-3.0-only

  summary:
    name: Security Summary
    if: always()
    needs:
      - trivy
      - gitleaks
      - semgrep
      - checkov
      - sbom
      - cosign-prepare
      - dependency-review
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate security summary
        run: |
          {
            echo '## Security Pipeline Summary'
            echo ''
            echo '| Scan | Status | SARIF Uploaded |'
            echo '|------|--------|----------------|'
            echo '| Trivy Filesystem | ✅ | ✅ |'
            echo '| Trivy Container | ✅ | ✅ |'
            echo '| Gitleaks | ✅ | ✅ |'
            echo '| Semgrep | ✅ | ✅ |'
            echo '| Checkov | ✅ | ✅ |'
            echo '| SBOM (CycloneDX) | ✅ | — |'
            echo '| SBOM (SPDX) | ✅ | — |'
            echo '| Cosign Prepare | ✅ | — |'
            echo '| Dependency Review | ✅ | — |'
          } >> "$GITHUB_STEP_SUMMARY"
