name: Feature Request
description: Suggest an idea for the AegisAI Control Center
title: "[Feature]: "
labels: ["enhancement"]
projects: ["aegisai/1"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please check the [roadmap](https://github.com/aegisai/dashboard/blob/main/docs/ROADMAP.md)
        and [existing issues](https://github.com/aegisai/dashboard/issues) first.

  - type: dropdown
    id: module
    attributes:
      label: Module
      description: Which module does this affect?
      options:
        - Environment
        - Docker Engine
        - Kubernetes
        - Helm
        - Terraform
        - Observability
        - Security
        - AI
        - UI / Design System
        - API Core
        - CI/CD
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve?
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: What would you like to see happen?
      placeholder: "A new panel that shows..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches have you considered?
      placeholder: "I tried doing X instead, but it didn't work because..."

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context, mockups, or screenshots here.

  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      options:
        - label: I have searched for existing feature requests
          required: true
        - label: This feature aligns with the project roadmap
          required: false
